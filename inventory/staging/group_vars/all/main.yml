---
# group_vars/all/main.yml
# Variables partagées par tous les hôtes
# Les secrets sont injectés via -e depuis GitHub Secrets — jamais ici

# PHP
php_version: "8.3"

# Laravel - repo
# github_token, laravel_repo_owner, laravel_repo_name sont injectés via -e
laravel_repo_url:    "https://{{ github_token }}@github.com/{{ laravel_repo_owner }}/{{ laravel_repo_name }}.git"
laravel_repo_branch: "staging"
laravel_app_dir:     "/var/www/{{ laravel_repo_name }}"
laravel_app_user:    "www-data"

# Timezone
server_timezone: "UTC"
