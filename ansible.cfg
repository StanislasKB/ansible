[defaults]
roles_path          = ./roles
host_key_checking   = False
remote_user         = ubuntu
retry_files_enabled = False
remote_tmp          = ~/.ansible/tmp

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining = True

[privilege_escalation]
become          = true
become_method   = sudo
become_user     = root
become_ask_pass = false
